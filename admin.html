<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>Admin</h1>
      <nav class="nav-inline">
        <a href="vente.html">Vente rapide</a>
        <a href="stock.html">Stock</a>
        <button id="logoutBtn" class="ghost">Déconnexion</button>
      </nav>
    </header>

    <main class="container admin-grid">
      <section class="card">
        <h2>Ajouter un item</h2>
        <form id="addProductForm" class="stack">
          <label><span>Nom</span><input id="newName" required /></label>
          <div class="grid two">
            <label><span>Catégorie</span><input id="newCategory" required placeholder="goodies, patch, biere..." /></label>
            <label><span>Type</span>
              <select id="newType">
                <option value="simple">Simple</option>
                <option value="pack">Pack</option>
              </select>
            </label>
          </div>
          <div class="grid three">
            <label><span>Stock initial</span><input id="newStock" type="number" min="0" value="0" required /></label>
            <label><span>Unité</span><input id="newUnitLabel" value="pièce" required /></label>
            <label><span>Taille unité</span><input id="newUnitSize" type="number" min="1" value="1" required /></label>
          </div>
          <button class="button" type="submit">Ajouter le produit</button>
        </form>
        <p id="productMessage" class="message"></p>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Exports</h2>
          <span class="muted">Visible ici seulement</span>
        </div>
        <form id="exportForm" class="stack">
          <label>
            <span>Période</span>
            <select id="exportType">
              <option value="date">Par date</option>
              <option value="week">Par semaine</option>
              <option value="month">Par mois</option>
            </select>
          </label>
          <div class="grid three">
            <label><span>Date</span><input id="exportDate" type="date" /></label>
            <label><span>Semaine</span><input id="exportWeek" type="number" min="1" max="53" /></label>
            <label><span>Mois</span><input id="exportMonth" type="month" /></label>
          </div>
          <button class="button secondary" type="submit">Exporter en PDF</button>
        </form>
        <p id="exportMessage" class="message"></p>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
